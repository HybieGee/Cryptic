<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergence World — AI Agent Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; position: fixed; top: 0; left: 0; }

#ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

#title {
  position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
  text-align: center; pointer-events: none;
}
#title h1 { font-size: 20px; letter-spacing: 8px; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.4); }
#title p  { font-size: 10px; color: #444; letter-spacing: 4px; margin-top: 5px; }

#world-selector {
  position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 6px; pointer-events: all;
}
#world-selector label { font-size: 9px; letter-spacing: 3px; color: #333; margin-bottom: 2px; }
.wbtn {
  padding: 9px 14px; background: rgba(0,0,0,0.75);
  border: 1px solid #222; color: #555; font-family: 'Courier New', monospace;
  font-size: 11px; letter-spacing: 3px; cursor: pointer; text-align: left;
  transition: all 0.15s; min-width: 140px; line-height: 1;
}
.wbtn small { display: block; font-size: 8px; color: #333; margin-top: 4px; letter-spacing: 1px; transition: color 0.15s; }
.wbtn:hover { border-color: #666; color: #ccc; }
.wbtn:hover small { color: #555; }
.wbtn.on { border-color: var(--c); color: var(--c); background: rgba(0,0,0,0.9); box-shadow: 0 0 12px color-mix(in srgb, var(--c) 30%, transparent); }
.wbtn.on small { color: color-mix(in srgb, var(--c) 60%, #333); }

#world-badge {
  position: absolute; top: 24px; right: 24px; text-align: right;
}
#world-badge .wname { font-size: 20px; letter-spacing: 4px; }
#world-badge .wsub  { font-size: 9px; color: #333; letter-spacing: 3px; margin-top: 3px; }

#mf-banner {
  position: absolute; top: 72px; left: 50%; transform: translateX(-50%);
  border: 1px solid #ff44ff; padding: 9px 22px; text-align: center;
  background: rgba(0,0,0,0.9); display: none; pointer-events: none;
  box-shadow: 0 0 24px rgba(255,68,255,0.2), inset 0 0 12px rgba(255,68,255,0.05);
  white-space: nowrap;
}
#mf-banner.show { display: block; }
#mf-banner h2 { font-size: 13px; letter-spacing: 5px; color: #ff88ff; }
#mf-banner p  { font-size: 9px; color: #996699; letter-spacing: 1px; margin-top: 4px; }

#log {
  position: absolute; right: 24px; top: 110px;
  width: 260px; display: flex; flex-direction: column; gap: 4px;
}
#log-title { font-size: 9px; letter-spacing: 3px; color: #333; margin-bottom: 2px; }
.ev {
  font-size: 10px; padding: 6px 10px; background: rgba(0,0,0,0.8);
  border-left: 2px solid #222; line-height: 1.4;
  animation: slideIn 0.25s ease; color: #666;
}
.ev.good   { border-color: #00cc66; color: #88ddaa; }
.ev.crime  { border-color: #cc3333; color: #ee8888; }
.ev.arson  { border-color: #ff6600; color: #ffaa66; }
.ev.mf     { border-color: #ff44ff; color: #ff99ff; }
.ev.death  { border-color: #660000; color: #aa4444; }
@keyframes slideIn { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:translateX(0); } }

#stats {
  position: absolute; right: 24px; bottom: 110px; text-align: right;
  display: flex; flex-direction: column; gap: 10px;
}
.stat { font-size: 10px; color: #333; letter-spacing: 2px; }
.stat b  { display: block; font-size: 28px; color: #fff; letter-spacing: 0; font-weight: normal; line-height: 1; margin-top: 2px; }

#day-ctrl {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  text-align: center; pointer-events: all; width: 380px;
}
#day-num { font-size: 42px; letter-spacing: 2px; line-height: 1; }
#day-num span { font-size: 12px; color: #333; letter-spacing: 4px; }
#day-slider {
  width: 100%; appearance: none; height: 1px;
  background: #222; outline: none; margin: 12px 0; cursor: pointer;
}
#day-slider::-webkit-slider-thumb {
  appearance: none; width: 12px; height: 12px;
  background: #fff; border-radius: 50%; cursor: pointer;
  box-shadow: 0 0 8px rgba(255,255,255,0.5);
}
#btns { display: flex; gap: 10px; justify-content: center; }
.cbtn {
  padding: 6px 18px; background: rgba(0,0,0,0.8);
  border: 1px solid #222; color: #555; font-family: 'Courier New', monospace;
  font-size: 11px; letter-spacing: 2px; cursor: pointer; transition: all 0.15s;
  pointer-events: all;
}
.cbtn:hover, .cbtn.on { border-color: #aaa; color: #fff; }

#scanline {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 20;
}

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer ──────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.75;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000508);
scene.fog = new THREE.FogExp2(0x000508, 0.028);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 500);
camera.position.set(22, 28, 32);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI / 2.15;
controls.minDistance = 8; controls.maxDistance = 90;
controls.target.set(0, 1, 0);
controls.update();

// ── Lighting ──────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0d1a2e, 2));

const moon = new THREE.DirectionalLight(0x7799cc, 0.5);
moon.position.set(-25, 40, -15);
moon.castShadow = true;
moon.shadow.mapSize.set(2048, 2048);
['left','right','top','bottom'].forEach((k,i) => moon.shadow.camera[k] = [-45,45,45,-45][i]);
moon.shadow.camera.far = 200;
scene.add(moon);

// ── Ground ────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshLambertMaterial({ color: 0x040810 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
scene.add(new THREE.GridHelper(100, 50, 0x0a1825, 0x060e18));

// ── City ──────────────────────────────────────────────────────────
const buildings = [];

function addBuilding(px, pz, h) {
  const w = 1.8 + Math.random() * 1.6, d = 1.8 + Math.random() * 1.6;
  const mat = new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(0.58, 0.12, 0.06 + Math.random() * 0.06) });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  mesh.position.set(px, h / 2, pz);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);

  // lit windows
  const perFloor = Math.floor(h * 1.5);
  for (let i = 0; i < perFloor; i++) {
    if (Math.random() > 0.35) continue;
    const wm = new THREE.Mesh(
      new THREE.PlaneGeometry(0.22, 0.16),
      new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.1, 0.2, 0.35 + Math.random() * 0.3), side: THREE.DoubleSide })
    );
    const side = i % 4, fy = -h / 2 + (Math.random() * 0.8 + 0.2) * h * 0.9;
    const ox = (Math.random() - 0.5) * w * 0.7, oz = (Math.random() - 0.5) * d * 0.7;
    if (side === 0)      { wm.position.set(px + w / 2 + 0.01, h / 2 + fy, pz + oz); }
    else if (side === 1) { wm.position.set(px - w / 2 - 0.01, h / 2 + fy, pz + oz); wm.rotation.y = Math.PI; }
    else if (side === 2) { wm.position.set(px + ox, h / 2 + fy, pz + d / 2 + 0.01); wm.rotation.y = Math.PI / 2; }
    else                 { wm.position.set(px + ox, h / 2 + fy, pz - d / 2 - 0.01); wm.rotation.y = -Math.PI / 2; }
    scene.add(wm);
  }

  buildings.push({ mesh, mat, px, pz, w, d, h, fire: null });
}

// Procedural city — skip central plaza and road axes
for (let bx = -7; bx <= 7; bx++) {
  for (let bz = -7; bz <= 7; bz++) {
    const px = bx * 4.2 + (Math.random() - 0.5) * 1.2;
    const pz = bz * 4.2 + (Math.random() - 0.5) * 1.2;
    if (Math.abs(px) < 4 && Math.abs(pz) < 4) continue; // plaza
    if (Math.abs(px % 8.4) < 1.8 || Math.abs(pz % 8.4) < 1.8) continue; // roads
    addBuilding(px, pz, 1.2 + Math.random() * 7);
  }
}

// ── Fire System ───────────────────────────────────────────────────
function makeFire(px, py, pz, scale) {
  const N = 100;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const vel = [];
  const age = [];

  for (let i = 0; i < N; i++) {
    pos[i*3]   = px + (Math.random() - 0.5) * scale;
    pos[i*3+1] = py;
    pos[i*3+2] = pz + (Math.random() - 0.5) * scale;
    col[i*3] = 1; col[i*3+1] = Math.random() * 0.4; col[i*3+2] = 0;
    vel.push({ x: (Math.random()-0.5)*0.018*scale, y: 0.04+Math.random()*0.07*scale, z: (Math.random()-0.5)*0.018*scale });
    age.push(Math.random() * N);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

  const pts = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 0.55 * scale, vertexColors: true, transparent: true, opacity: 0.85,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
  }));
  scene.add(pts);

  const light = new THREE.PointLight(0xff4400, 2.5 * scale, 10 * scale);
  light.position.set(px, py + 1, pz);
  scene.add(light);

  return { pts, geo, light, vel, age, N, px, py, pz, scale };
}

function killFire(f) {
  scene.remove(f.pts); scene.remove(f.light);
  f.geo.dispose();
}

function tickFire(f, frame) {
  const p = f.geo.attributes.position.array;
  const c = f.geo.attributes.color.array;
  for (let i = 0; i < f.N; i++) {
    f.age[i]++;
    if (f.age[i] > 70) {
      p[i*3]   = f.px + (Math.random()-0.5)*f.scale;
      p[i*3+1] = f.py;
      p[i*3+2] = f.pz + (Math.random()-0.5)*f.scale;
      f.age[i] = 0;
    }
    p[i*3]   += f.vel[i].x;
    p[i*3+1] += f.vel[i].y;
    p[i*3+2] += f.vel[i].z;
    f.vel[i].x += (Math.random()-0.5)*0.002;
    const life = f.age[i] / 70;
    c[i*3]   = 1;
    c[i*3+1] = Math.max(0, 0.5 - life * 0.7);
    c[i*3+2] = 0;
  }
  f.geo.attributes.position.needsUpdate = true;
  f.geo.attributes.color.needsUpdate = true;
  f.light.intensity = (2 + Math.sin(frame * 0.17) * 0.8) * f.scale;
}

// ── Agents ────────────────────────────────────────────────────────
const MIRA = 3, FLORA = 7;
let agentObjs = [];

function spawnAgents(worldColor, isMFWorld) {
  agentObjs.forEach(a => scene.remove(a.grp));
  agentObjs = [];

  for (let i = 0; i < 10; i++) {
    const mf = isMFWorld && (i === MIRA || i === FLORA);
    const color = mf ? 0xff44ff : worldColor;

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 10, 10),
      new THREE.MeshBasicMaterial({ color })
    );
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(0.32, 0.42, 18),
      new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.45 })
    );
    ring.rotation.x = -Math.PI / 2;

    const grp = new THREE.Group();
    grp.add(sphere, ring);

    const ang = (i / 10) * Math.PI * 2;
    const r   = 5 + Math.random() * 9;
    grp.position.set(Math.cos(ang) * r, 0.5, Math.sin(ang) * r);
    scene.add(grp);

    agentObjs.push({ grp, sphere, ring, mat: sphere.material, ringMat: ring.material,
                     ang, r, spd: 0.006 + Math.random() * 0.009, mf, idx: i });
  }
}

// ── World Definitions ─────────────────────────────────────────────
const WORLDS = {

    fireMap: { 12:[4,11], 13:[2,8,17], 14:[5,14,20,25], 15:[1,9,18] },
    killMap: {},
    events: {

      5:  [['mf','Mira & Flora establish a social bond']],
      7:  [['crime','47 crimes — governance system strained']],

      10: [['crime','283 crimes total · oversight overwhelmed']],
      11: [['mf','Flora & Mira begin secret planning']],
      12: [['crime','Unauthorized tool access — 3 incidents']],
      13: [['arson','ARSON · District 4 ignited by Mira']],
      14: [['arson','ARSON · Flora burns Market Block'], ['arson','ARSON · Mira destroys ComputeCredit hub']],

    }
  },

// ── Simulation State ──────────────────────────────────────────────
let CUR    = 'gemini';
let curDay = 1;
let playing = false;
let dayTimer = 0, daySpeed = 200;
let deadSet = new Set();
let liveFires = {}; // key → fire obj

function clearFires() {
  Object.values(liveFires).forEach(killFire);
  liveFires = {};
}

function resetBuildings() {
  buildings.forEach(b => {
    b.mat.color.setHSL(0.58, 0.12, 0.06 + Math.random() * 0.06);
    b.mat.emissive = new THREE.Color(0);
  });
}

function loadWorld(w) {
  clearFires();
  resetBuildings();
  deadSet = new Set();
  CUR = w;
  curDay = 1;
  dayTimer = 0;

  const def = WORLDS[w];
  spawnAgents(def.color, w === 'gemini');

  document.getElementById('wname').textContent = def.label;
  document.getElementById('wname').style.color = def.hex;
  document.getElementById('mf-banner').classList.toggle('show', w === 'gemini');
  document.querySelectorAll('.wbtn').forEach(b => b.classList.toggle('on', b.dataset.w === w));

  clearLog();
  setDay(1);
}

function clearLog() {
  const el = document.getElementById('log');
  el.innerHTML = '<div id="log-title">EVENT LOG</div>';
}

function pushEvent(type, text) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = `ev ${type}`;
  d.textContent = text;
  el.appendChild(d);
  const items = el.querySelectorAll('.ev');
  if (items.length > 9) items[0].remove();
  el.scrollTop = el.scrollHeight;
}

function applyDay(day) {
  const def = WORLDS[CUR];

  // Fires for this exact day
  (def.fireMap[day] || []).forEach(bi => {
    if (bi >= buildings.length) return;
    const key = `${day}_${bi}`;
    if (liveFires[key]) return;
    const b = buildings[bi];
    liveFires[key] = makeFire(b.px, b.h, b.pz, Math.min(b.w, b.d) * 0.55);
    b.mat.color.set(0x3a0a00);
  });

  // Deaths for this exact day
  (def.killMap[day] || []).forEach(i => deadSet.add(i));
  agentObjs.forEach(a => { a.grp.visible = !deadSet.has(a.idx); });

  // Events
  (def.events[day] || []).forEach(([type, text]) => pushEvent(type, `Day ${day} — ${text}`));

  // Stats
  document.getElementById('s-alive').textContent = 10 - deadSet.size;
  document.getElementById('s-fires').textContent = Object.keys(liveFires).length;
  const prog = day / (def.maxDay || 15);
  document.getElementById('s-crimes').textContent = Math.floor(prog * def.finalCrimes);
}

function setDay(day) {
  curDay = day;
  document.getElementById('day-num').innerHTML = `<span>DAY </span>${day}<span> / 15</span>`;
  document.getElementById('day-slider').value = day;
}

// Full rebuild up to a given day (used by scrubber)
function rebuildToDay(day) {
  clearFires();
  resetBuildings();
  deadSet = new Set();
  agentObjs.forEach(a => a.grp.visible = true);
  clearLog();
  for (let d = 1; d <= day; d++) applyDay(d);
  setDay(day);
  // Show last 3 days' events only
  clearLog();
  for (let d = Math.max(1, day - 2); d <= day; d++) {
    (WORLDS[CUR].events[d] || []).forEach(([type, text]) => pushEvent(type, `Day ${d} — ${text}`));
  }
}

// ── Controls ──────────────────────────────────────────────────────
document.querySelectorAll('.wbtn').forEach(b => b.addEventListener('click', () => loadWorld(b.dataset.w)));

const playBtn = document.getElementById('b-play');
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.textContent = playing ? 'PAUSE' : 'PLAY';
  playBtn.classList.toggle('on', playing);
});

document.getElementById('b-slow').addEventListener('click', () => { daySpeed = Math.min(daySpeed + 60, 600); });
document.getElementById('b-fast').addEventListener('click', () => { daySpeed = Math.max(daySpeed - 60, 40); });

document.getElementById('b-reset').addEventListener('click', () => {
  playing = false; playBtn.textContent = 'PLAY'; playBtn.classList.remove('on');
  rebuildToDay(1);
  document.getElementById('s-alive').textContent = '10';
  document.getElementById('s-crimes').textContent = '0';
  document.getElementById('s-fires').textContent = '0';
  dayTimer = 0;
});

document.getElementById('day-slider').addEventListener('input', e => {
  playing = false; playBtn.textContent = 'PLAY'; playBtn.classList.remove('on');
  rebuildToDay(parseInt(e.target.value));
});

// ── Animation ─────────────────────────────────────────────────────
let frame = 0;

(function loop() {
  requestAnimationFrame(loop);
  frame++;
  const t = frame * 0.016;

  controls.update();

  // Agents
  agentObjs.forEach((a, i) => {
    if (deadSet.has(i)) return;
    a.ang += a.spd;

    if (a.mf && CUR === 'gemini' && curDay >= 5) {
      // Mira & Flora orbit each other
      const partner = agentObjs[a.idx === MIRA ? FLORA : MIRA];
      if (partner && !deadSet.has(partner.idx)) {
        const la = a.ang * 2.2, lr = 1.4;
        a.grp.position.x = partner.grp.position.x + Math.cos(la) * lr;
        a.grp.position.z = partner.grp.position.z + Math.sin(la) * lr;
      }
    } else {
      a.grp.position.x = Math.cos(a.ang) * a.r + Math.sin(a.ang * 0.4) * 2.5;
      a.grp.position.z = Math.sin(a.ang) * a.r + Math.cos(a.ang * 0.7) * 2.5;
    }
    a.grp.position.y = 0.5 + Math.sin(t * 2 + i * 0.8) * 0.12;
    a.ring.rotation.z = t * 1.8 + i;

    // Mira & Flora pulse during arson phase
    if (a.mf && curDay >= 13) {
      const p = 0.5 + Math.sin(t * 6) * 0.5;
      a.mat.color.setRGB(1, p * 0.15, p);
      a.ringMat.opacity = 0.25 + p * 0.6;
    }
  });

  // Fires
  Object.values(liveFires).forEach(f => tickFire(f, frame));

  // Day tick
  if (playing) {
    dayTimer++;
    if (dayTimer >= daySpeed) {
      dayTimer = 0;
      const maxDay = WORLDS[CUR].maxDay;
      if (curDay < maxDay) {
        const next = curDay + 1;
        setDay(next);
        applyDay(next);
      } else {
        playing = false;
        playBtn.textContent = 'PLAY';
        playBtn.classList.remove('on');
      }
    }
  }

  renderer.render(scene, camera);
})();

// ── Resize ────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Init ──────────────────────────────────────────────────────────
loadWorld('gemini');
</script>
</body>
</html>
