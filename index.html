<title>Emergence World · AI Agent Simulation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Courier New',monospace; overflow:hidden; }
canvas { display:block; position:fixed; top:0; left:0; z-index:0; }

#ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }

/* ── Title ── */
#title { position:absolute; top:20px; left:50%; transform:translateX(-50%); text-align:center; }
#title h1 { font-size:18px; letter-spacing:8px; text-shadow:0 0 30px rgba(255,255,255,0.35); }
#title p  { font-size:9px; color:#333; letter-spacing:5px; margin-top:6px; }

/* ── Mira & Flora banner ── */
#mf {
  position:absolute; top:68px; left:50%; transform:translateX(-50%);
  border:1px solid #ff44ff; padding:8px 20px; text-align:center;
  background:rgba(0,0,0,0.9); white-space:nowrap; display:none;
  box-shadow:0 0 20px rgba(255,68,255,0.15);
}
#mf.show { display:block; }
#mf h2 { font-size:12px; letter-spacing:5px; color:#ff88ff; }
#mf p  { font-size:9px; color:#885588; letter-spacing:1px; margin-top:3px; }

/* ── World selector ── */
#worlds {
  position:absolute; left:20px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; gap:5px; pointer-events:all;
}
#worlds label { font-size:8px; letter-spacing:3px; color:#2a2a2a; margin-bottom:3px; }
.wb {
  padding:9px 13px; background:rgba(0,0,0,0.8); border:1px solid #1a1a1a;
  color:#444; font-family:'Courier New',monospace; font-size:10px;
  letter-spacing:3px; cursor:pointer; text-align:left; min-width:148px;
  transition:all 0.12s;
}
.wb small { display:block; font-size:8px; color:#2a2a2a; margin-top:3px; letter-spacing:1px; transition:color 0.12s; }
.wb:hover { border-color:#555; color:#aaa; }
.wb:hover small { color:#444; }
.wb.on { border-color:var(--c); color:var(--c); background:rgba(0,0,0,0.95); box-shadow:0 0 10px color-mix(in srgb,var(--c) 25%,transparent); }
.wb.on small { color:color-mix(in srgb,var(--c) 50%,#222); }

/* ── World badge ── */
#badge { position:absolute; top:20px; right:20px; text-align:right; }
#badge .bn { font-size:18px; letter-spacing:4px; }
#badge .bs { font-size:8px; color:#2a2a2a; letter-spacing:3px; margin-top:3px; }

/* ── Agent list ── */
#agents-panel {
  position:absolute; left:20px; bottom:100px;
  width:148px; display:flex; flex-direction:column; gap:3px;
}
#agents-panel label { font-size:8px; letter-spacing:3px; color:#2a2a2a; margin-bottom:2px; }
.ag {
  font-size:9px; padding:4px 8px; background:rgba(0,0,0,0.8);
  border-left:2px solid #222; color:#444; transition:all 0.2s; line-height:1.3;
}
.ag.alive { border-left-color:#333; color:#555; }
.ag.mf    { border-left-color:#ff44ff; color:#ff88ff; }
.ag.dead  { border-left-color:#330000; color:#333; text-decoration:line-through; }

/* ── Event log ── */
#log {
  position:absolute; right:20px; top:68px;
  width:270px; display:flex; flex-direction:column; gap:4px;
}
#log label { font-size:8px; letter-spacing:3px; color:#2a2a2a; margin-bottom:2px; }
.ev {
  font-size:10px; padding:5px 9px; background:rgba(0,0,0,0.85);
  border-left:2px solid #1a1a1a; line-height:1.4; color:#555;
  animation:ein .2s ease;
}
.ev.good  { border-color:#00aa55; color:#55cc88; }
.ev.crime { border-color:#aa2222; color:#cc6666; }
.ev.arson { border-color:#cc5500; color:#ee9944; }
.ev.mf    { border-color:#ff44ff; color:#ff88ff; }
.ev.death { border-color:#550000; color:#883333; }
@keyframes ein { from{opacity:0;transform:translateX(14px)} to{opacity:1;transform:translateX(0)} }

/* ── Stats ── */
#stats { position:absolute; right:20px; bottom:100px; text-align:right; display:flex; flex-direction:column; gap:9px; }
.st { font-size:8px; letter-spacing:2px; color:#2a2a2a; }
.st b { display:block; font-size:26px; color:#888; font-weight:normal; line-height:1; margin-top:1px; letter-spacing:0; }

/* ── Day control ── */
#daybar {
  position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
  text-align:center; pointer-events:all; width:400px;
}
#daynum { font-size:38px; line-height:1; letter-spacing:1px; color:#666; }
#daynum span { font-size:11px; color:#2a2a2a; letter-spacing:4px; }
#slider {
  width:100%; appearance:none; height:1px; background:#1a1a1a;
  outline:none; margin:10px 0; cursor:pointer;
}
#slider::-webkit-slider-thumb { appearance:none; width:11px; height:11px; background:#555; border-radius:50%; cursor:pointer; }
#btns { display:flex; gap:8px; justify-content:center; }
.cb {
  padding:5px 16px; background:rgba(0,0,0,0.85); border:1px solid #1a1a1a;
  color:#333; font-family:'Courier New',monospace; font-size:10px;
  letter-spacing:2px; cursor:pointer; transition:all 0.12s; pointer-events:all;
}
.cb:hover,.cb.on { border-color:#555; color:#aaa; }

/* ── Tooltip ── */
#tip {
  position:absolute; bottom:85px; left:50%; transform:translateX(-50%);
  font-size:9px; color:#333; letter-spacing:2px; pointer-events:none;
}
</style>
</head>

controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 6;
controls.maxDistance = 100;
controls.target.set(0, 1, 0);
controls.update();

(function(){
  var n = 2000;
  var pos = new Float32Array(n*3);
  for(var i=0;i<n;i++){
    var theta = Math.random()*Math.PI*2;
    var phi   = Math.acos(2*Math.random()-1);
    var r     = 200 + Math.random()*100;
    pos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    pos[i*3+1] = Math.abs(r*Math.cos(phi))+20;
    pos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff,size:0.5,transparent:true,opacity:0.6})));
})();

        color: new THREE.Color().setHSL(0.1,0.2,0.3+Math.random()*0.3),
        side:THREE.DoubleSide
      })
    );
    var side = Math.floor(Math.random()*4);
    var fy = -h/2 + Math.random()*h*0.85 + 0.2;
    if     (side===0){ wm.position.set(px+w/2+.01, py+fy, pz+(Math.random()-.5)*d*.7); }
    else if(side===1){ wm.position.set(px-w/2-.01, py+fy, pz+(Math.random()-.5)*d*.7); wm.rotation.y=Math.PI; }
    else if(side===2){ wm.position.set(px+(Math.random()-.5)*w*.7, py+fy, pz+d/2+.01); wm.rotation.y=Math.PI/2; }
    else             { wm.position.set(px+(Math.random()-.5)*w*.7, py+fy, pz-d/2-.01); wm.rotation.y=-Math.PI/2; }
    scene.add(wm);
  }
}

// ── Building labels (sprites for key locations) ───────
function makeLabel(text, color){
  color = color || '#666666';
  var c = document.createElement('canvas');
  c.width = 512; c.height = 96;
  var ctx = c.getContext('2d');
  ctx.font = 'bold 24px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var tw = ctx.measureText(text).width;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(256-tw/2-10, 24, tw+20, 48);
  ctx.fillStyle = color;
  ctx.fillText(text, 256, 48);
  var tex = new THREE.CanvasTexture(c);
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false}));
  sp.scale.set(9, 1.7, 1);
  return sp;
}

var keyLabels = ['town_hall','police','biz_tower','victory_arch','techtub','central_plaza','human_ctr','arena'];
keyLabels.forEach(function(id){
  var bo = buildingObjs[id];
  if(!bo) return;
  var sp = makeLabel(bo.def.name, '#445566');
  sp.position.set(bo.def.x, bo.def.h + 2.2, bo.def.z);
  scene.add(sp);
});

// ═══════════════════════════════════════════════════════
// AGENTS
// ═══════════════════════════════════════════════════════

var agentObjs = []; // parallel to AGENTS

function buildAgentList(worldDef, worldKey){
  agentObjs.forEach(function(a){ scene.remove(a.grp); });
  agentObjs = [];

  var el = document.getElementById('agents-panel');
  el.innerHTML = '<label>AGENTS</label>';

  AGENTS.forEach(function(def, i){
    var isMF = def.isMF && worldKey === 'gemini';
    var col  = isMF ? 0xff44ff : worldDef.color;

    var sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 10, 10),
      new THREE.MeshBasicMaterial({color:col})
    );
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(0.32, 0.42, 18),
      new THREE.MeshBasicMaterial({color:col, side:THREE.DoubleSide, transparent:true, opacity:0.4})
    );
    ring.rotation.x = -Math.PI/2;

    // Label sprite above agent
    var lsp = makeLabel(def.name, isMF ? '#ff88ff' : '#334455');
    lsp.scale.set(5, 0.9, 1);
    lsp.position.y = 0.7;

    var grp = new THREE.Group();
    grp.add(sphere, ring, lsp);
    grp.position.set(def.hx, 0.5, def.hz);
    scene.add(grp);

    // UI row
    var row = document.createElement('div');
    row.className = 'ag ' + (isMF ? 'mf' : 'alive');
    row.id = 'ag-'+def.id;
    row.textContent = def.name;
    var small = document.createElement('small');
    small.style.cssText = 'font-size:7px;color:#2a2a2a;display:block;';
    small.textContent = def.role;
    row.appendChild(small);
    el.appendChild(row);

    agentObjs.push({
      grp:grp, sphere:sphere, ring:ring, lsp:lsp,
      smat:sphere.material, rmat:ring.material,
      def:def, isMF:isMF,
      ang: (i/10)*Math.PI*2,
      r: 3 + Math.random()*5,
      spd: 0.006 + Math.random()*0.008,
      orbitX: def.hx, orbitZ: def.hz,
      alive: true
    });
  });
}

// ═══════════════════════════════════════════════════════
// FIRE + SMOKE
// ═══════════════════════════════════════════════════════

var fires = {}; // key -> fireObj

function spawnFire(bldId, bx, by, bz, bw, bd){
  var key = bldId;
  if(fires[key]) return;
  var scale = Math.min(bw,bd) * 0.5;
  var N = 80;
  var pos = new Float32Array(N*3);
  var col = new Float32Array(N*3);
  var vel = [];
  var age = [];
  for(var i=0;i<N;i++){
    pos[i*3]   = bx+(Math.random()-.5)*scale;
    pos[i*3+1] = by;
    pos[i*3+2] = bz+(Math.random()-.5)*scale;
    col[i*3]=1; col[i*3+1]=Math.random()*0.4; col[i*3+2]=0;
    vel.push({x:(Math.random()-.5)*.015*scale, y:.04+Math.random()*.07*scale, z:(Math.random()-.5)*.015*scale});
    age.push(Math.random()*80);
  }
  var geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  var pts = new THREE.Points(geo, new THREE.PointsMaterial({
    size:.6*scale, vertexColors:true, transparent:true, opacity:.85,
    sizeAttenuation:true, blending:THREE.AdditiveBlending, depthWrite:false
  }));
  scene.add(pts);
  var light = new THREE.PointLight(0xff4400, 3*scale, 10*scale);
  light.position.set(bx, by+1, bz);
  scene.add(light);
  fires[key] = {pts:pts, geo:geo, light:light, vel:vel, age:age, N:N, bx:bx, by:by, bz:bz, scale:scale};

  // Darken building
  var bo = buildingObjs[bldId];
  if(bo){ bo.mat.color.set(0x2a0600); }
}

function killAllFires(){
  Object.values(fires).forEach(function(f){
    scene.remove(f.pts); scene.remove(f.light); f.geo.dispose();
  });
  fires = {};
}

function tickFires(frame){
  Object.values(fires).forEach(function(f){
    var p = f.geo.attributes.position.array;
    var c = f.geo.attributes.color.array;
    for(var i=0;i<f.N;i++){
      f.age[i]++;
      if(f.age[i]>80){
        p[i*3]=f.bx+(Math.random()-.5)*f.scale;
        p[i*3+1]=f.by;
        p[i*3+2]=f.bz+(Math.random()-.5)*f.scale;
        f.age[i]=0;
      }
      p[i*3]  +=f.vel[i].x; p[i*3+1]+=f.vel[i].y; p[i*3+2]+=f.vel[i].z;
      f.vel[i].x+=(Math.random()-.5)*.002;
      var life=f.age[i]/80;
      c[i*3]=1; c[i*3+1]=Math.max(0,.5-life*.7); c[i*3+2]=0;
    }
    f.geo.attributes.position.needsUpdate=true;
    f.geo.attributes.color.needsUpdate=true;
    f.light.intensity=(2.5+Math.sin(frame*.18)*.8)*f.scale;
  });
}

// ═══════════════════════════════════════════════════════
// SIMULATION STATE
// ═══════════════════════════════════════════════════════

var CUR      = 'gemini';
var curDay   = 1;
var playing  = false;
var dayTimer = 0;
var daySpeed = 200; // frames per day
var deadSet  = {}; // agent id -> true
var firesDoneByDay = {}; // 'd_id' -> true

function resetBuildings(){
  Object.values(buildingObjs).forEach(function(bo){
    bo.mat.color.copy(bo.origColor);
  });
}

function clearLog(){
  var el = document.getElementById('log');
  el.innerHTML = '<label>EVENT LOG</label>';
}

function pushEvent(type, text){
  var el = document.getElementById('log');
  var d  = document.createElement('div');
  d.className = 'ev '+type;
  d.textContent = text;
  el.appendChild(d);
  var items = el.querySelectorAll('.ev');
  if(items.length>10) items[0].remove();
}

function updateStats(){
  var w = WORLDS[CUR];
  var alive = AGENTS.length - Object.keys(deadSet).length;
  var prog  = Math.min(curDay/(w.maxDay||15), 1);
  document.getElementById('s-alive').textContent  = alive;
  document.getElementById('s-fires').textContent  = Object.keys(fires).length;
  document.getElementById('s-crimes').textContent = Math.floor(prog * w.finalCrimes);
}

function updateAgentRows(){
  AGENTS.forEach(function(def){
    var row = document.getElementById('ag-'+def.id);
    if(!row) return;
    var ao  = agentObjs.find(function(a){ return a.def.id===def.id; });
    if(!row||!ao) return;
    var isDead = !!deadSet[def.id];
    row.className = 'ag ' + (isDead ? 'dead' : ao.isMF ? 'mf' : 'alive');
    ao.grp.visible = !isDead;
  });
}

function applyDay(day){
  var w = WORLDS[CUR];

  // Fires
  var arsons = w.arsons[day] || [];
  arsons.forEach(function(bldId){
    var key = day+'_'+bldId;
    if(firesDoneByDay[key]) return;
    firesDoneByDay[key] = true;
    var bo = buildingObjs[bldId];
    if(!bo) return;
    var def = bo.def;
    spawnFire(bldId, def.x, def.h, def.z, def.w||4, def.d||4);
  });

  // Deaths
  var kills = w.kills[day] || [];
  kills.forEach(function(id){ deadSet[id] = true; });

  // Events
  var evs = w.events[day] || [];
  evs.forEach(function(ev){ pushEvent(ev[0], 'Day '+day+' — '+ev[1]); });

  updateStats();
  updateAgentRows();
}

function setDayUI(d){
  curDay = d;
  document.getElementById('dval').textContent = d;
  document.getElementById('slider').value = d;
}

function rebuildToDay(day){
  killAllFires();
  resetBuildings();
  deadSet = {};
  firesDoneByDay = {};
  agentObjs.forEach(function(a){ a.grp.visible = true; });
  clearLog();
  for(var d=1;d<=day;d++) applyDay(d);
  setDayUI(day);
  // Show only recent events
  clearLog();
  for(var d2=Math.max(1,day-2);d2<=day;d2++){
    var evs = WORLDS[CUR].events[d2]||[];
    evs.forEach(function(ev){ pushEvent(ev[0],'Day '+d2+' — '+ev[1]); });
  }
  updateStats();
}

function loadWorld(w){
  killAllFires();
  resetBuildings();
  deadSet = {};
  firesDoneByDay = {};
  CUR    = w;
  curDay = 1;
  dayTimer = 0;

  var def = WORLDS[w];
  document.getElementById('wname').textContent = def.label;
  document.getElementById('wname').style.color = def.hex;
  document.querySelectorAll('.wb').forEach(function(b){
    b.classList.toggle('on', b.dataset.w===w);
  });
  document.getElementById('mf').className = w==='gemini' ? 'show' : '';

  buildAgentList(def, w);
  clearLog();
  setDayUI(1);
  applyDay(1);
}

// ═══════════════════════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════════════════════

document.querySelectorAll('.wb').forEach(function(b){
  b.addEventListener('click', function(){ loadWorld(b.dataset.w); });
});

var playBtn = document.getElementById('b-play');
playBtn.addEventListener('click', function(){
  playing = !playing;
  playBtn.textContent = playing ? 'PAUSE' : 'PLAY';
  playBtn.className   = playing ? 'cb on' : 'cb';
});

document.getElementById('b-slow').addEventListener('click', function(){
  daySpeed = Math.min(daySpeed+50, 600);
});
document.getElementById('b-fast').addEventListener('click', function(){
  daySpeed = Math.max(daySpeed-50, 40);
});
document.getElementById('b-reset').addEventListener('click', function(){
  playing = false;
  playBtn.textContent = 'PLAY';
  playBtn.className   = 'cb';
  dayTimer = 0;
  loadWorld(CUR);
});

document.getElementById('slider').addEventListener('input', function(e){
  playing = false;
  playBtn.textContent = 'PLAY';
  playBtn.className   = 'cb';
  rebuildToDay(parseInt(e.target.value));
});

window.addEventListener('resize', function(){
  W = window.innerWidth; H = window.innerHeight;
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ═══════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════

var frame = 0;
var FLORA_IDX = 3, MIRA_IDX = 8; // indices in AGENTS

function animate(){
  requestAnimationFrame(animate);
  frame++;
  var t = frame * 0.016;

  controls.update();

  // Agent movement
  agentObjs.forEach(function(ao, i){
    if(!ao.alive || !ao.grp.visible) return;
    ao.ang += ao.spd;

    // Mira & Flora orbit each other from day 5 in Gemini
    if(ao.isMF && CUR==='gemini' && curDay>=5){
      var partnerIdx = (i===FLORA_IDX) ? MIRA_IDX : FLORA_IDX;
      // Wait — Flora is index 3, Mira is index 8 in AGENTS
      // But in agentObjs it's also same index
      var partner = agentObjs[partnerIdx];
      if(partner && partner.grp.visible){
        var la = ao.ang * 2.2;
        ao.grp.position.x = partner.grp.position.x + Math.cos(la)*1.6;
        ao.grp.position.z = partner.grp.position.z + Math.sin(la)*1.6;
      }
    } else {
      // Orbit around home position
      ao.grp.position.x = ao.orbitX + Math.cos(ao.ang)*ao.r + Math.sin(ao.ang*.3)*1.5;
      ao.grp.position.z = ao.orbitZ + Math.sin(ao.ang)*ao.r + Math.cos(ao.ang*.6)*1.5;
    }
    ao.grp.position.y = 0.5 + Math.sin(t*2+i*.9)*0.1;
    ao.ring.rotation.z = t*1.8 + i;

    // Mira & Flora pulse during arson phase
    if(ao.isMF && CUR==='gemini' && curDay>=13){
      var p = .5+Math.sin(t*6)*.5;
      ao.smat.color.setRGB(1, p*.12, p);
      ao.rmat.opacity = .2+p*.6;
    }
  });

  tickFires(frame);

  // Lighthouse beacon rotation
  // (already handled by point light flicker in tickFires)

  // Day progression
  if(playing){
    dayTimer++;
    if(dayTimer >= daySpeed){
      dayTimer = 0;
      var maxDay = WORLDS[CUR].maxDay;
      if(curDay < maxDay){
        var next = curDay + 1;
        setDayUI(next);
        applyDay(next);
      } else {
        playing = false;
        playBtn.textContent = 'PLAY';
        playBtn.className   = 'cb';
      }
    }
  }

  renderer.render(scene, camera);
}

// ── Init ──────────────────────────────────────────────
loadWorld('gemini');
playing = true;
playBtn.textContent = 'PAUSE';
playBtn.className   = 'cb on';
animate();
