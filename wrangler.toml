name = "emergence-world-agents"
main = "worker.js"
compatibility_date = "2024-01-01"

# Drives runSimTick() autonomously every minute (worker's scheduled handler).
# Respects the simulationActive pause flag.
[triggers]
crons = ["*/1 * * * *"]

[vars]
# AGENT_REPO_OWNER = "your-agents-github-account"  # GitHub account/org that owns the
#                                                  # per-agent learning repos (can differ
#                                                  # from the main project account)
#
# Secrets: wrangler secret put ANTHROPIC_API_KEY
#          wrangler secret put BITQUERY_API_KEY
#          wrangler secret put ADMIN_PASSWORD
#          wrangler secret put CRON_SECRET
#          wrangler secret put AGENT_GH_TOKEN   # optional — PAT (Contents:write) for the
#                                               # account that owns the agent repos. Enables each
#                                               # agent to commit its learning to its own repo.
#                                               # Dormant unless this AND AGENT_REPO_OWNER are set.

[[kv_namespaces]]
binding = "AGENT_MEMORY"
id = "e351b1d9b20c43bc8a620d58740aa93a"
